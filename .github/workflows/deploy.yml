name: Deploy to GCP VM

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Execute remote deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            APP_DIR="/home/kavin_charles/atp-crm"
            
            echo "Pulling latest changes..."
            sudo git config --global --add safe.directory $APP_DIR
            sudo -u kavin_charles git -C $APP_DIR pull origin master
            
            echo "Installing backend dependencies..."
            sudo -u kavin_charles bash -c "cd $APP_DIR/backend && npm install"
            
            echo "Installing frontend dependencies..."
            sudo -u kavin_charles bash -c "cd $APP_DIR/frontend && npm install"
            
            echo "Building frontend..."
            sudo -u kavin_charles bash -c "cd $APP_DIR && npm run build"
            
            echo "Restarting backend server..."
            sudo fuser -k 3001/tcp 2>/dev/null || true
            sleep 2
            sudo -u kavin_charles bash -c "cd $APP_DIR && nohup npm start </dev/null >/tmp/atp-crm.log 2>&1 &"
            
            echo "Deployment triggered successfully!"
